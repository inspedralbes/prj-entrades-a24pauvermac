name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /var/www/tiquet-master
            
            # Pull latest code
            git pull origin main
            
            # Install/update PHP dependencies
            cd backend-laravel
            composer install --no-dev --optimize-autoloader
            
            # Copy production env and generate key
            cp .env.production .env
            php artisan key:generate
            
            # Run migrations
            php artisan migrate --force
            
            # Clear and cache config
            php artisan config:clear
            php artisan cache:clear
            
            # Install/update Node dependencies
            cd ../backend-node
            npm install --production
            
            # Install/update Nuxt dependencies and build
            cd ../front-nuxt
            cp .env.production .env 2>/dev/null || true
            npm install
            npm run build
            
            # Restart all services with PM2
            cd /var/www/tiquet-master
            
            # Restart Laravel on all interfaces
            pm2 restart laravel || pm2 start "php artisan serve --host=0.0.0.0 --port=8000" --name laravel
            
            # Restart Node WebSocket
            pm2 restart node-socket || pm2 start src/index.js --name node-socket
            
            # Restart Nuxt
            pm2 restart nuxt-app || pm2 start npm -- run preview -- --port 3000 --host 0.0.0.0 --name nuxt-app
            
            # Save PM2 config for reboot
            pm2 save