name: Deploy and Update Services - TiquetMaster

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Full Deploy Process
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update, Configure and Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
          API_URL: ${{ secrets.API_URL }}
          SOCKET_URL: ${{ secrets.SOCKET_URL }}
          STRIPE_SECRET: ${{ secrets.STRIPE_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_TOKEN: ${{ secrets.TMDB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          envs: MYSQL_PASSWORD,MYSQL_ROOT_PASSWORD,LARAVEL_APP_KEY,API_URL,SOCKET_URL,STRIPE_SECRET,JWT_SECRET,TMDB_API_KEY,TMDB_TOKEN
          script: |
            # Asegurar que existe el directorio y es un repositorio Git
            mkdir -p /var/www/tiquet-master
            cd /var/www/tiquet-master || exit

            if [ ! -d ".git" ]; then
              echo "Inicializando repositorio Git nuevo..."
              git init
              git remote add origin https://github.com/inspedralbes/prj-entrades-a24pauvermac.git
              git fetch origin
              git checkout -t origin/main -f || git checkout -b main
            fi

            echo "Descargando últimos cambios de Git..."
            git reset --hard origin/main
            git pull origin main

            echo "Configurando .env maestro (Docker)..."
            echo "DB_DATABASE=tiquet_db" > .env
            echo "DB_USERNAME=tiquet_user" >> .env
            echo "DB_PASSWORD=$MYSQL_PASSWORD" >> .env
            echo "DB_ROOT_PASSWORD=$MYSQL_ROOT_PASSWORD" >> .env

            echo "Configurando entorno de backend-laravel..."
            cd ./backend-laravel
            cp .env.example .env 2>/dev/null || true
            echo "APP_ENV=production" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=$API_URL" >> .env
            echo "APP_KEY=$LARAVEL_APP_KEY" >> .env
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=mysql" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=tiquet_db" >> .env
            echo "DB_USERNAME=tiquet_user" >> .env
            echo "DB_PASSWORD=$MYSQL_PASSWORD" >> .env
            echo "REDIS_CLIENT=phpredis" >> .env
            echo "REDIS_HOST=redis" >> .env
            echo "REDIS_PORT=6379" >> .env
            echo "REDIS_PASSWORD=null" >> .env
            echo "STRIPE_SECRET=$STRIPE_SECRET" >> .env
            echo "JWT_SECRET=$JWT_SECRET" >> .env
            echo "TMDB_API_KEY=$TMDB_API_KEY" >> .env
            echo "TMDB_TOKEN=$TMDB_TOKEN" >> .env
            cd ..

            echo "Configurando entorno de backend-node..."
            cd ./backend-node
            cp .env.example .env 2>/dev/null || true
            cd ..

            echo "Configurando entorno del frontend-nuxt..."
            cd ./front-nuxt
            echo "NUXT_PUBLIC_API_URL=$API_URL" > .env
            echo "NUXT_PUBLIC_SOCKET_URL=$SOCKET_URL" >> .env
            cd ..

            echo "Desplegando la aplicación con Docker Compose..."
            docker compose -f docker-compose.prod.yml up -d --build

            echo "¡Despliegue finalizado con éxito!"